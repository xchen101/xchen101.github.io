---
layout: default
---

<article class="post-full">
  <header class="post-header">
    <span class="post-date">{{ page.date | date: "%B %-d, %Y" }}</span>
    <h1 class="post-full-title">{{ page.title }}</h1>
  </header>
  {% if page.image %}
  <img src="{{ page.image | relative_url }}" alt="{{ page.title }}" class="post-hero-img" loading="lazy">
  {% endif %}
  <div class="post-body">
    {{ content }}
  </div>
</article>
