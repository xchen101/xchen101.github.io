<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncatewords: 50 }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body id="top">
  <nav class="site-nav" id="site-nav">
    <a href="{{ '/' | relative_url }}" class="site-name">{{ site.title }}</a>
    <div class="nav-links">
      <a href="{{ '/#about' | relative_url }}" class="nav-link" data-nav="about">About</a>
      <a href="{{ '/#projects' | relative_url }}" class="nav-link" data-nav="projects">Projects</a>
      <a href="{{ '/#experience' | relative_url }}" class="nav-link" data-nav="experience">Experience</a>
      <a href="{{ '/#publications' | relative_url }}" class="nav-link" data-nav="publications">Publications</a>
      <a href="{{ '/#community' | relative_url }}" class="nav-link" data-nav="community">Community</a>
      <a href="{{ '/blog/' | relative_url }}" class="nav-link {% if page.url contains '/blog' %}active{% endif %}">Blog</a>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  {% include footer.html %}

  <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
</body>
</html>
