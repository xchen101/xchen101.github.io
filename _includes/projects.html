<div class="section-head">
  <div class="section-head-title">
    <div class="section-eyebrow">— 02 / Open Source</div>
    <h2 class="section-title">Projects &amp; repositories</h2>
  </div>
  <a class="section-link" href="https://github.com/{{ site.github_username }}">github.com/{{ site.github_username }} →</a>
</div>

<div class="repo-grid" id="repo-grid">
  {% for repo in site.data.projects %}
  <a class="repo-card" href="{{ repo.url }}" data-repo="{{ repo.owner }}/{{ repo.name }}">
    <div class="repo-card-header">
      <svg class="repo-icon" width="16" height="16" viewBox="0 0 16 16" fill="#8A8A8A"><path d="M2 2.5A2.5 2.5 0 014.5 0h8.75a.75.75 0 01.75.75v12.5a.75.75 0 01-.75.75h-2.5a.75.75 0 010-1.5h1.75v-2h-8a1 1 0 00-.714 1.7.75.75 0 11-1.072 1.05A2.495 2.495 0 012 11.5v-9zm10.5-1h-8a1 1 0 00-1 1v7.326A2.5 2.5 0 014.5 9.5h8v-8z"/></svg>
      <span class="repo-name">{{ repo.name }}</span>
    </div>
    <p class="repo-desc">{{ repo.description }}</p>
    <div class="repo-meta">
      <span class="repo-language"><span class="language-dot" style="background:{{ repo.language_color }};"></span>{{ repo.language }}</span>
      <span class="repo-stars" data-stars>★ —</span>
      <span class="repo-updated" data-updated>Updated</span>
    </div>
  </a>
  {% endfor %}
</div>
