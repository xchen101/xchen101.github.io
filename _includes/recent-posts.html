<div class="section-head">
  <div class="section-head-title">
    <div class="section-eyebrow">— 01 / Field Notes</div>
    <h2 class="section-title">Recent interests</h2>
  </div>
  <a class="section-link" href="{{ '/blog/' | relative_url }}">View all posts →</a>
</div>

<div class="posts-grid">
  {% for post in site.posts limit: 3 %}
  <a class="post-card" href="{{ post.url | relative_url }}">
    {% if post.image %}
    <div class="post-card-thumb" style="background-image: url('{{ post.image | relative_url }}');"></div>
    {% else %}
    <div class="post-card-thumb post-card-thumb-empty"></div>
    {% endif %}
    <div class="post-card-body">
      <div class="post-card-meta">{{ post.date | date: "%d %b %Y" }}</div>
      <h3 class="post-card-title">{{ post.title }}</h3>
      <p class="post-card-excerpt">{{ post.excerpt | strip_html | truncatewords: 24 }}</p>
    </div>
  </a>
  {% endfor %}
</div>
